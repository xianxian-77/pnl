    ",": ["00","00","00","00","01","01","10"],
    "/": ["00001","00010","00100","00100","00100","01000","10000"],
    " ": ["00","00","00","00","00","00","00"],
    "¥": ["10001","01010","00100","11111","00100","11111","00100"],
    "£": ["00110","01001","01000","11110","01000","01000","11111"],
    "€": ["00110","01001","11100","01000","11100","01001","00110"],
    "^": ["00100","01010","10001","00000","00000","00000","00000"],
    "=": ["00000","00000","11111","00000","11111","00000","00000"],
  };
  function dotText(str, pitch, sparkle) {
    const s = String(str);
    const chars = [...s.toUpperCase()].map(c => c === "−" ? "-" : c);
    if (!chars.length || !chars.every(c => DOT_FONT[c])) return esc(s); // 字模外字符(中文/—等) → 普通文本回退
    const r = pitch * 0.36;
    let x = 0; const dots = [];
    for (const c of chars) {
      const g = DOT_FONT[c], w = g[0].length;
      for (let row = 0; row < 7; row++)
        for (let col = 0; col < w; col++)
          if (g[row][col] === "1")
            dots.push(`<circle cx="${((x + col + 0.5) * pitch).toFixed(2)}" cy="${((row + 0.5) * pitch).toFixed(2)}" r="${r.toFixed(2)}"${sparkle ? ` style="animation-delay:${(Math.random() * 380) | 0}ms"` : ""}/>`);
      x += w + 1;
    }
    const wpx = ((x - 1) * pitch).toFixed(2), hpx = (7 * pitch).toFixed(2);
    return `<svg class="dotnum" role="img" aria-label="${esc(s)}" viewBox="0 0 ${wpx} ${hpx}" width="${wpx}" height="${hpx}" fill="currentColor">${dots.join("")}</svg>`;
  }

  let firstRenderDone = false;
  function render() {
    // 首次渲染之后的任何重渲染都结束入场窗口, 否则 boot 窗内的数据到达/交互会把入场动画整套重放
    if (firstRenderDone) document.body.classList.remove("boot");
    firstRenderDone = true;
    const now = new Date();
    const todayKey = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
    const parsed = CORE.parseHoldings(holdingsText);
    const agg = CORE.aggregate(parsed.lots, todayKey);
    const q = effectiveQuotes(agg.positions.map(p => p.sym));
    const view = CORE.computeView(agg.positions, q);

    renderBanner(parsed, agg, view);
    renderTiles(view);
    renderStructure(view);
    renderSectorBar(view);
    renderHoldings(view, q);
    renderPnlChart(view);
    renderReturnCurve(parsed);

    const tsList = Object.values(quotes).map(x => x.ts || 0).filter(Boolean);
    if (tsList.length) {
      const d = new Date(Math.max(...tsList));
      const dayPrefix = d.toDateString() === now.toDateString() ? "" : (d.getMonth() + 1) + "/" + d.getDate() + " ";
      $("updated").textContent = "行情 " + dayPrefix + d.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
    } else $("updated").textContent = "";
  }

  function renderBanner(parsed, agg, view) {
    const parts = [];
    if (pendingImport != null) {
      parts.push(
        `<div class="banner">这条链接携带了一份持仓数据，与本机已保存的不同。要用哪份？` +
        `<div class="actions"><button class="primary" id="useImportBtn">用链接里的</button>` +
        `<button id="keepLocalBtn">保留本机的</button></div></div>`);
    }
    if (view.missing.length)
      parts.push(`<div class="banner">⚠️ ${view.missing.map(esc).join("、")} 暂无报价（未计入汇总）。点该行的「输入价格」可手动输入。</div>`);
    if (agg.warnings.length)
      parts.push(`<div class="banner">⚠️ ${agg.warnings.map(esc).join("<br>")}</div>`);
    if (parsed.warnings.length)
      parts.push(`<div class="banner">⚠️ ${parsed.warnings.map(esc).join("<br>")}</div>`);
    $("banner").innerHTML = parts.join("");
    const ui = $("useImportBtn"), kl = $("keepLocalBtn");
    if (ui) ui.onclick = () => {
      const pl = pendingImport; pendingImport = null;
      applyImport(pl);
      refresh();
    };
    if (kl) kl.onclick = () => { pendingImport = null; try { history.replaceState(null, "", location.pathname + location.search); } catch {} render(); };
  }

  function renderTiles(view) {
    const curs = Object.keys(view.totals);
    if (!curs.length) {
      // 区分“还没记持仓”和“有持仓但一个报价都没拿到”
      $("tiles").innerHTML = view.rows.length
        ? `<div class="tile hero"><div class="label">总市值</div><div class="value">—</div><div class="delta">暂无行情：点「刷新」重试，或点下方各行「输入价格」手动填</div></div>`
        : `<div class="tile hero"><div class="label">总市值</div><div class="value">—</div><div class="delta">在下方「编辑持仓」里记一笔开始</div></div>`;
      return;
    }
    // 主币种 = 市值最大的; 其他币种在角标注明
    curs.sort((a, b) => view.totals[b].value - view.totals[a].value);
    const main = curs[0], t = view.totals[main];
    const others = curs.slice(1);
    const M = (v, o) => CORE.fmtMoney(v, main, o), P = CORE.fmtPct;
    const totalPnl = t.unreal + t.realized;
    const partial = t.dayPartial > 0 ? `，不含 ${t.dayPartial} 项` : "";
    const tiles = [
      `<div class="tile"><div class="label">总盈亏（未实现）</div>
        <div class="value ${pnlCls(t.unreal)}">${dotText(M(t.unreal, { signed: true }), 4, true)}</div>
        <div class="delta ${pnlCls(t.unreal)}">${P(t.unrealPct)}</div></div>`,
      `<div class="tile"><div class="label">今日盈亏${view.rows.some(r => r.quote && r.quote.ext) ? "（含盘前后）" : ""}${t.dayPartial > 0 ? `（不含 ${t.dayPartial} 项）` : ""}</div>
        <div class="value ${pnlCls(t.dayPnl)}">${t.dayPct == null ? "—" : dotText(M(t.dayPnl, { signed: true }), 4, true)}</div>
        <div class="delta ${pnlCls(t.dayPnl)}">${t.dayPct == null ? "" : P(t.dayPct)}</div></div>`,
      `<div class="tile"><div class="label">已实现盈亏</div>
        <div class="value ${pnlCls(t.realized)}">${dotText(M(t.realized, { signed: true }), 4, true)}</div>
        <div class="delta ${pnlCls(totalPnl)}">累计（含未实现）${M(totalPnl, { signed: true })}</div></div>`,
      `<div class="tile"><div class="label">总成本</div><div class="value">${dotText(M(t.cost), 4, true)}</div></div>`,
    ];
    // 其他币种各补一行小计
    for (const c of others) {
      const o = view.totals[c];
      tiles.push(`<div class="tile"><div class="label">${esc(c)} 小计</div>
        <div class="value">${dotText(CORE.fmtMoney(o.value, c), 4)}</div>
        <div class="delta ${pnlCls(o.unreal)}">${CORE.fmtMoney(o.unreal, c, { signed: true })}（${P(o.unrealPct)}）</div></div>`);
    }
    $("tiles").innerHTML = tiles.join("");
  }

  /* ---- 主视觉: 编辑体结论 + 巨型总市值 + 毛玻璃渐变球 ----
     只呈现主币种(市值最大的那个桶): 占比是分币种算的, 混币种会把
     "某外币里的 100%" 当成全组合最大仓, 球径和结论全错 */
  function buildStatement(view) {
    const curs = Object.keys(view.totals).sort((a, b) => view.totals[b].value - view.totals[a].value);
    if (!curs.length) return "";
    const rows = view.rows.filter(r => r.value != null && r.cur === curs[0]);
    if (!rows.length) return "";
    const t = view.totals[curs[0]];
    const top = rows[0];
    let s = `<b>${rows.length}</b> 只持仓，<b>${esc(top.sym)}</b> 占 <b>${(top.alloc * 100).toFixed(0)}%</b>；`;
    if (t.dayPct != null) {
      const a = Math.abs(t.dayPct);
      const w = t.dayPnl > 0 ? (a < 0.01 ? "微涨" : a < 0.03 ? "上涨" : "大涨")
        : t.dayPnl < 0 ? (a < 0.01 ? "微跌" : a < 0.03 ? "下跌" : "大跌") : "持平";
      s += `今日${w} <b class="${pnlCls(t.dayPnl)}">${CORE.fmtPct(a, false)}</b>，`;
    }
    s += `累计${t.unreal >= 0 ? "浮盈" : "浮亏"} <b class="${pnlCls(t.unreal)}">${CORE.fmtPct(Math.abs(t.unrealPct), false)}</b>。`;
    return s;
  }

  // 海报画布槽位: 桌面文案在左 → 球群偏右; 手机文案占中带 → 球群贴上下边
  const ORB_SLOTS = [[62, 40], [80, 66], [58, 12], [88, 24], [46, 84], [70, 6], [30, 88], [93, 50]];
  const ORB_SLOTS_M = [[72, 16], [28, 84], [48, 8], [88, 32], [16, 20], [78, 90], [48, 92], [90, 64]];
  function renderStructure(view) {
    const el = $("structure");
    const curs = Object.keys(view.totals).sort((a, b) => view.totals[b].value - view.totals[a].value);
    const mainCur = curs[0];
    const all = mainCur == null ? []
      : view.rows.filter(r => r.value != null && r.alloc > 0 && r.cur === mainCur);
    if (!all.length) { el.style.display = "none"; el.innerHTML = ""; return; }
    el.style.display = "";
    // 持仓多时海报不许乱: 只画最大的 7 只, 其余聚合成一颗「其他」球 (大小=合计占比, 颜色=合计盈亏)
    const MAXORB = 7;
    let rows = all;
    if (all.length > MAXORB) {
      const rest = all.slice(MAXORB);
      const restCost = rest.reduce((s, r) => s + r.cost, 0);
      const restUnreal = rest.reduce((s, r) => s + r.unreal, 0);
      rows = all.slice(0, MAXORB).concat([{
        sym: "其他", otherCount: rest.length,
        value: rest.reduce((s, r) => s + r.value, 0),
        alloc: rest.reduce((s, r) => s + r.alloc, 0),
        unreal: restUnreal,
        unrealPct: restCost > 0 ? restUnreal / restCost : 0,
        cur: mainCur,
      }]);
    }
    const t = view.totals[mainCur];
    const others = curs.slice(1);
    const maxA = Math.max(...rows.map(r => r.alloc));
    const slots = window.innerWidth < 640 ? ORB_SLOTS_M : ORB_SLOTS;
    const RMAX = window.innerWidth < 640 ? 18 : 13; // 最大球半径 (% 首屏画布宽)
    const orbs = [], callouts = [];
    rows.forEach((r, i) => {
      const [x, y] = slots[i];
      const rad = Math.min(RMAX, Math.max(3.5, RMAX * Math.sqrt(r.alloc / maxA)));
      const cls = r.unreal > 0 ? "pos-orb" : r.unreal < 0 ? "neg-orb" : "flat-orb";
      const op = (0.55 + Math.min(0.45, Math.abs(r.unrealPct || 0) * 3)).toFixed(2);
      const label = r.otherCount ? `其他 ${r.otherCount} 只` : r.sym;
      const tip = `${label} · 市值 ${CORE.fmtMoney(r.value, r.cur)} · ${r.unreal >= 0 ? "盈" : "亏"} ${CORE.fmtPct(Math.abs(r.unrealPct), false)}`;
      orbs.push(`<button class="orb" data-idx="${i}" data-row="${r.otherCount ? "" : esc(r.sym)}" data-tip="${esc(tip)}" aria-label="${esc(tip)}，点击查看该行"
        style="left:${x}%;top:${y}%;width:${(rad * 2).toFixed(1)}%;opacity:${op}"><i class="orb-vis ${cls}" style="--d:${i * 90}ms"></i></button>`);
      if (i < 3) {
        callouts.push(`<div class="callout" data-orb="${i}">
          <div class="pct">${(r.alloc * 100).toFixed(0)}<span class="pctsign">%</span></div>
          <div class="cap">${esc(r.sym)} 占比</div></div>`);
      }
    });
    const partial = t.dayPartial > 0 ? `，不含 ${t.dayPartial} 项` : "";
    const heroSub = t.dayPct == null ? ""
      : `<div class="heroSub ${pnlCls(t.dayPnl)}">${arrow(t.dayPnl)} 今日 ${CORE.fmtMoney(t.dayPnl, mainCur, { signed: true })}（${CORE.fmtPct(t.dayPct)}${partial}）</div>`;
    el.innerHTML = `
      <div class="s-left">
        <div class="s-mark" aria-hidden="true"><svg viewBox="0 0 24 24" width="13" height="13" fill="none"><g stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="12" y1="3" x2="12" y2="21"/><line x1="4.2" y1="7.5" x2="19.8" y2="16.5"/><line x1="19.8" y1="7.5" x2="4.2" y2="16.5"/></g></svg></div>
        <p class="statement">${buildStatement(view)}</p>
        <div class="heroNum">
          <div class="label">总市值${others.length ? "（" + esc(mainCur) + "，另有 " + esc(others.join("/")) + " 持仓未并入）" : ""}</div>
          <div class="heroVal">${dotText(CORE.fmtMoney(t.value, mainCur), 6.2, true)}</div>
          ${heroSub}
        </div>
        ${(aiBrief.dayKey === localDayKey() && aiBrief.text)
          ? `<p class="aibrief">${esc(aiBrief.text)}<span class="cap">GEMINI · 今日点评</span></p>` : ""}
      </div>
      <div class="s-field">
        <div class="s-decor" style="left:64%;top:50%;width:56%"></div>
        <div class="s-decor" style="left:40%;top:26%;width:24%"></div>
        ${orbs.join("")}${callouts.join("")}
        <div class="chart-tip" id="chartTip" hidden></div>
      </div>`;
    const tip = $("chartTip");
    const field = el.querySelector(".s-field");
    // callout 直接居中在各自球心上 (球互相重叠, 摆旁边会看起来属于别的球), 渲染后实测球位
    const placeCallouts = () => {
      const fr = field.getBoundingClientRect();
      if (!fr.width) return;
      el.querySelectorAll(".callout").forEach(c => {
        const orb = el.querySelector(`.orb[data-idx="${c.dataset.orb}"]`);
        if (!orb) return;
        const or = orb.getBoundingClientRect();
        const ch = c.offsetHeight || 44, cw = c.offsetWidth || 90;
        const cx = Math.min(Math.max(or.left - fr.left + or.width / 2, cw / 2 + 4), fr.width - cw / 2 - 4);
        const cy = Math.min(Math.max(or.top - fr.top + or.height / 2 - ch / 2, 4), fr.height - ch - 4);
        c.style.left = cx.toFixed(0) + "px";
        c.style.top = cy.toFixed(0) + "px";
        c.style.visibility = "visible";
      });
    };
    requestAnimationFrame(placeCallouts);
    el.querySelectorAll(".orb").forEach(orb => {
      const show = () => {
        tip.textContent = orb.dataset.tip;
        tip.hidden = false;
        const or = orb.getBoundingClientRect(), fr = field.getBoundingClientRect();
        const half = tip.offsetWidth / 2 + 4; // 实测气泡宽度再夹, 长文案不许溢出
        tip.style.left = Math.min(Math.max(or.left - fr.left + or.width / 2, half), fr.width - half) + "px";
        tip.style.top = Math.max(or.top - fr.top, 30) + "px";
      };
      const hide = () => { tip.hidden = true; };
      orb.addEventListener("mouseenter", show);
      orb.addEventListener("mouseleave", hide);
      orb.addEventListener("focus", show);
      orb.addEventListener("blur", hide);
      orb.addEventListener("click", () => {
        hide(); // 触屏上点击后气泡不许滞留
        // 「其他」聚合球 → 滚到明细列表; 普通球 → 滚到对应行
        const row = orb.dataset.row
          ? $("holdings").querySelector(`.hrow[data-sym="${CSS.escape(orb.dataset.row)}"]`)
          : $("holdings");
        if (!row) return;
        row.scrollIntoView({ behavior: matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth", block: "center" });
        row.classList.remove("flash");
        void row.offsetWidth; // 强制重排让动画可重启
        row.classList.add("flash");
        row.addEventListener("animationend", () => row.classList.remove("flash"), { once: true });
      });
    });
  }

  /* ---- 板块: 手动标签优先, 常见代码自动归类, 都没有则「其他」 ---- */
  const AUTO_SECTOR = {
    MU: "半导体", NVDA: "半导体", AMD: "半导体", INTC: "半导体", TSM: "半导体", AVGO: "半导体", QCOM: "半导体",
    QQQ: "ETF", SPY: "ETF", VOO: "ETF", VTI: "ETF", IWM: "ETF", DIA: "ETF", ARKK: "ETF", SMH: "ETF",
    IAUM: "黄金", GLD: "黄金", IAU: "黄金", GDX: "黄金", SGOL: "黄金",
    LMT: "军工", RTX: "军工", NOC: "军工", GD: "军工", BA: "军工", HII: "军工",
    MSTR: "加密概念", COIN: "加密概念", MARA: "加密概念", RIOT: "加密概念", IBIT: "加密概念", HOOD: "加密概念",
    LITE: "光通信", AAPL: "科技", MSFT: "科技", GOOG: "科技", GOOGL: "科技", META: "科技", AMZN: "科技", NFLX: "科技", ORCL: "科技", PLTR: "科技",
    TSLA: "汽车", NIO: "汽车", LI: "汽车", XPEV: "汽车",
    JPM: "金融", V: "金融", MA: "金融", GS: "金融", "BRK-B": "金融",
    XOM: "能源", CVX: "能源", OXY: "能源",
    LLY: "医药", PFE: "医药", JNJ: "医药", UNH: "医药", NVO: "医药",
    KO: "消费", PG: "消费", MCD: "消费", NKE: "消费", COST: "消费", WMT: "消费",
  };
  // 优先级: 手动标签 > Gemini 判定(缓存) > 内置映射 > 其他
  const sectorOf = p => p.sector || aiSec[p.sym] || AUTO_SECTOR[p.sym] || "其他";

  /* ---- Gemini 通用调用 (gemini flash 偶发 503/429, 重试两次退避) ---- */
  async function geminiText(prompt, wantJson) {
    const key = settings.geminiKey;
    if (!key) return null;
    const body = JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: wantJson ? { temperature: 0, responseMimeType: "application/json" } : { temperature: 0.2 },
    });
    for (let i = 0; i < 3; i++) {
      try {
        const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + encodeURIComponent(key),
          { method: "POST", headers: { "Content-Type": "application/json" }, body });
        if (r.ok) {
          const j = await r.json();
          return (j && j.candidates && j.candidates[0] && j.candidates[0].content
            && j.candidates[0].content.parts && j.candidates[0].content.parts[0]
            && j.candidates[0].content.parts[0].text) || null;
        }
        if (r.status !== 503 && r.status !== 429) return null; // 非过载类错误不重试
      } catch {}
      await new Promise(res => setTimeout(res, 4000 * (i + 1)));
    }
    return null;
  }

  /* ---- Gemini 板块判定: 只对没有任何归类的代码问一次, 结果永久缓存 ---- */
  async function classifySectors(syms) {
    if (!syms.length) return null;
    const txt = await geminiText(`给下列股票代码各分配一个简短中文板块标签(2-4字, 例: 科技/半导体/军工/黄金/ETF/医药/金融/能源/消费/汽车/加密概念/光通信/网络安全/工业)。只返回 JSON 对象 {"代码":"标签"}。代码: ${syms.join(", ")}`, true);
    try { return txt ? JSON.parse(txt) : null; } catch { return null; }
  }

  /* ---- Gemini 股票详解: 首次展开该行时生成, 永久缓存 ---- */
  const descBusy = new Set();
  async function ensureDesc(sym) {
    if (aiDesc[sym] || descBusy.has(sym) || !settings.geminiKey) return;
    descBusy.add(sym);
    try {
      const nm = (quotes[sym] && quotes[sym].name) || "";
      const txt = await geminiText(`用通俗易懂的中文介绍 ${sym}${nm ? "（" + nm + "）" : ""} 是做什么的：主营业务、靠什么赚钱、在行业里的位置。150-200字，一段话，口语化但准确，不要标题、不要列表、不要问候语。若是 ETF 或基金，说明它跟踪什么、适合什么用途。`);
      const clean = txt ? String(txt).trim().replace(/\s*\n+\s*/g, " ").slice(0, 320) : "";
      if (clean) {
        aiDesc[sym] = clean;
        LS.set(K.aidesc, aiDesc);
        render();
      }
    } finally { descBusy.delete(sym); }
  }

  /* ---- Gemini 每日组合点评: 每天只生成一次 ---- */
  let briefBusy = false;
  async function refreshAiBrief() {
    if (briefBusy || !settings.geminiKey) return;
    const dk = localDayKey();
    if (aiBrief.dayKey === dk && aiBrief.text) return;
    const parsed = CORE.parseHoldings(holdingsText);
    const agg = CORE.aggregate(parsed.lots);
    const q = effectiveQuotes(agg.positions.map(p => p.sym));
    const view = CORE.computeView(agg.positions, q);
    const curs = Object.keys(view.totals).sort((a, b) => view.totals[b].value - view.totals[a].value);
    if (!curs.length) return;
    const t = view.totals[curs[0]];
    const rows = view.rows.filter(r => r.value != null && r.cur === curs[0]);
    if (!rows.length || t.dayPct == null) return; // 有当日数据才值得点评
    briefBusy = true;
    try {
      const lines = rows.map(r =>
        `${r.sym}(${sectorOf(r)}):占比${(r.alloc * 100).toFixed(0)}%,今日${r.dayPct == null ? "?" : (r.dayPct * 100).toFixed(1) + "%"},累计${(r.unrealPct * 100).toFixed(1)}%`).join("; ");
      const prompt = `你是克制的持仓观察助手。根据数据写今日组合点评：第一句说整体涨跌和主因，中间点名1-2只最值得注意的持仓，最后一句给一个观察角度。口语但冷静，不喊单不给买卖建议，不用感叹号，60-110字，直接输出正文不要开头语。数据：今日整体${(t.dayPct * 100).toFixed(2)}%，累计未实现${(t.unrealPct * 100).toFixed(1)}%；${lines}`;
      const txt = await geminiText(prompt);
      const clean = txt ? String(txt).trim().replace(/\s*\n+\s*/g, " ").slice(0, 220) : "";
      if (clean) { aiBrief = { dayKey: dk, text: clean }; LS.set(K.aibrief, aiBrief); render(); }
    } finally { briefBusy = false; }
  }

  /* ---- 财报日历: Finnhub 免费接口, 每代码缓存一天 ---- */
  let earnBusy = false;
  async function refreshEarnings(syms) {
    if (earnBusy || !settings.finnhubKey) return;
    const now = Date.now(), TTL = 24 * 3600 * 1000;
    const need = syms.filter(s => !s.includes(".") && !(earn[s] && now - earn[s].at < TTL));
    if (!need.length) return;
    earnBusy = true;
    try {
      const fmt = d => d.toISOString().slice(0, 10);
      const from = fmt(new Date()), to = fmt(new Date(Date.now() + 90 * 86400000));
      const rs = await Promise.allSettled(need.map(async s => {
        const j = JSON.parse(await fetchText(
          `https://finnhub.io/api/v1/calendar/earnings?from=${from}&to=${to}&symbol=${encodeURIComponent(s)}&token=${encodeURIComponent(settings.finnhubKey)}`, 10000));
        const list = ((j && j.earningsCalendar) || []).map(e => String(e.date)).filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d)).sort();
        return list[0] || "";
      }));
      let got = 0;
      rs.forEach((r, i) => {
        if (r.status === "fulfilled") { earn[need[i]] = { date: r.value, at: Date.now() }; got++; }
      });
      if (got) { LS.set(K.earn, earn); render(); }
    } finally { earnBusy = false; }
  }
  // 21 天内的财报 → 行内小标, 7 天内高亮
  function earnChip(sym) {
    const e = earn[sym];
    if (!e || !e.date) return "";
    const d = new Date(e.date + "T12:00:00Z");
    const days = Math.round((d.getTime() - Date.now()) / 86400000);
    if (days < 0 || days > 21) return "";
    const md = (d.getUTCMonth() + 1) + "/" + d.getUTCDate();
    return ` <span class="earnchip${days <= 7 ? " soon" : ""}">财报 ${md}${days <= 7 ? "·" + (days === 0 ? "今天" : days + "天") : ""}</span>`;
  }

  let aiSecBusy = false; const aiSecTried = new Set();
  async function refreshAiSectors() {
    if (aiSecBusy || !settings.geminiKey) return;
    const { positions } = CORE.aggregate(CORE.parseHoldings(holdingsText).lots);
    const need = positions
      .filter(p => !p.sector && !aiSec[p.sym] && !AUTO_SECTOR[p.sym] && !aiSecTried.has(p.sym))
      .map(p => p.sym);
    if (!need.length) return;
    aiSecBusy = true;
    try {
      need.forEach(s => aiSecTried.add(s)); // 本次会话内失败也不再重复问
      const map = await classifySectors(need);
      let got = 0;
      for (const [k2, v2] of Object.entries(map || {})) {
        const sym = String(k2).toUpperCase().trim();
        const val = String(v2).replace(/\s+/g, "").slice(0, 6);
        if (need.includes(sym) && val) { aiSec[sym] = val; got++; }
      }
      if (got) { LS.set(K.aisec, aiSec); render(); }
    } catch {} finally { aiSecBusy = false; }
  }

  /* ---- 板块分布: 墨色堆叠条(深浅=占比排名) + 图例 ---- */
  const SEC_OP = [0.92, 0.68, 0.52, 0.38, 0.28, 0.2, 0.15, 0.11];
  function renderSectorBar(view) {
    const el = $("sectorWrap");
    const curs = Object.keys(view.totals).sort((a, b) => view.totals[b].value - view.totals[a].value);
    const rows = curs.length ? view.rows.filter(r => r.value != null && r.cur === curs[0]) : [];
    if (rows.length < 1) { el.style.display = "none"; el.innerHTML = ""; return; }
    el.style.display = "";
    const total = view.totals[curs[0]].value;
    const g = Object.create(null);
    rows.forEach(r => { const s = sectorOf(r); g[s] = (g[s] || 0) + r.value; });
    const parts = Object.entries(g).sort((a, b) => b[1] - a[1]);
    const op = i => SEC_OP[Math.min(i, SEC_OP.length - 1)];
    const bar = parts.map(([name, v], i) =>
      `<i class="seg" style="width:${(v / total * 100).toFixed(2)}%;opacity:${op(i)}" title="${esc(name)} ${(v / total * 100).toFixed(1)}%"></i>`).join("");
    const legend = parts.map(([name, v], i) =>
      `<span class="sleg"><i style="opacity:${op(i)}"></i>${esc(name)} <b>${(v / total * 100).toFixed(1)}%</b></span>`).join("");
    el.innerHTML = `<div class="kicker">板块分布 <span class="en">SECTORS</span></div>
      <div class="sec-bar">${bar}</div><div class="sec-legend">${legend}</div>`;
  }

  /* ---- 盈亏分布图: 每只一根渐隐柱, 盈利向上/亏损向下, 高度∝|盈亏%| ---- */
  function renderPnlChart(view) {
    const wrap = $("pnlWrap");
    const curs = Object.keys(view.totals).sort((a, b) => view.totals[b].value - view.totals[a].value);
    let rows = curs.length ? view.rows.filter(r => r.value != null && r.cur === curs[0]) : [];
    if (rows.length < 2) { wrap.style.display = "none"; $("pnlchart").innerHTML = ""; return; }
    wrap.style.display = "";
    // 持仓多时柱子太密: 只画盈亏幅度最大的 14 只, 其余看明细表 (截断必须注明)
    let capNote = "";
    if (rows.length > 14) {
      rows = [...rows].sort((a, b) => Math.abs(b.unrealPct) - Math.abs(a.unrealPct)).slice(0, 14)
        .sort((a, b) => b.value - a.value);
      capNote = `<div class="hint">仅展示盈亏幅度最大的 14 只，其余见明细表。</div>`;
    }
    const maxAbs = Math.max(0.0001, ...rows.map(r => Math.abs(r.unrealPct)));
    $("pnlchart").innerHTML = `<div class="pc-cols">` + rows.map((r, i) => {
      const h = Math.max(3, Math.abs(r.unrealPct) / maxAbs * 100);
      const up = r.unreal >= 0;
      const pctTxt = CORE.fmtPct(r.unrealPct);
      return `<button class="pc-col" data-row="${esc(r.sym)}" aria-label="${esc(r.sym)} 盈亏 ${pctTxt}，点击查看该行">
        <div class="pc-half pc-up">${up ? `<span class="pc-val pos">${pctTxt}</span><i class="pc-bar pc-pos" style="height:${h.toFixed(1)}%;--d:${i * 60}ms"></i>` : ""}</div>
        <div class="pc-lab">${esc(r.sym)}</div>
        <div class="pc-half pc-down">${up ? "" : `<i class="pc-bar pc-neg" style="height:${h.toFixed(1)}%;--d:${i * 60}ms"></i><span class="pc-val neg">${pctTxt}</span>`}</div>
      </button>`;
    }).join("") + `</div>` + capNote;
    $("pnlchart").querySelectorAll(".pc-col").forEach(col => {
      col.addEventListener("click", () => {
        const row = $("holdings").querySelector(`.hrow[data-sym="${CSS.escape(col.dataset.row)}"]`);
        if (!row) return;
        row.scrollIntoView({ behavior: matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth", block: "center" });
        row.classList.remove("flash");
        void row.offsetWidth;
        row.classList.add("flash");
        row.addEventListener("animationend", () => row.classList.remove("flash"), { once: true });
      });
    });
  }

  /* 30 日走势 sparkline: 折线用次级墨色, 端点圆点按月度涨跌着色 */
  function sparkSvg(spark) {
    if (!Array.isArray(spark) || spark.length < 5) return "";
    const w = 64, h = 22, pad = 2.5;
    const min = Math.min(...spark), max = Math.max(...spark), rng = (max - min) || 1;
    const px = i => (pad + i * (w - 2 * pad) / (spark.length - 1)).toFixed(1);
    const py = v => (h - pad - (v - min) / rng * (h - 2 * pad)).toFixed(1);
    const pts = spark.map((v, i) => px(i) + "," + py(v)).join(" ");
    return `<svg class="spark" viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" aria-hidden="true">
      <polyline points="${pts}" fill="none" stroke-width="1.5" pathLength="1"/>
      <circle cx="${px(spark.length - 1)}" cy="${py(spark[spark.length - 1])}" r="2.2"/>
    </svg>`;
  }

  /* ---- 回报率曲线: 周/月/年/总 四档, 组合未实现回报率 ---- */
  function renderReturnCurve(parsed) {
    const box = $("retchart");
    const bucket = asObj(hist[curRange]);
    const h2 = {};
    for (const [s, v] of Object.entries(bucket))
      if (v && Array.isArray(v.ts) && Array.isArray(v.cl) && v.ts.length === v.cl.length) h2[s] = { ts: v.ts, cl: v.cl };
    const rc = CORE.returnCurve(parsed.lots, h2);
    const tabs = `<div class="rtabs">` + Object.keys(RANGES).map(k =>
      `<button class="rtab${k === curRange ? " on" : ""}" data-r="${k}">${k}</button>`).join("") + `</div>`;
    let chart;
    if (rc.ts.length >= 2) {
      // SPY 基准: 与组合曲线同一时间窗, 以窗口首日为 0 归一
      let bench = null;
      const bh = bucket[BENCH];
      if (bh && Array.isArray(bh.ts) && bh.ts.length) {
        const bp = [];
        let bi = 0, base = null, okAll = true;
        for (const T of rc.ts) {
          while (bi + 1 < bh.ts.length && bh.ts[bi + 1] <= T) bi++;
          if (bh.ts[bi] > T) { okAll = false; break; }
          if (base == null) base = bh.cl[bi];
          bp.push(bh.cl[bi] / base - 1);
        }
        if (okAll && bp.length === rc.ts.length) bench = bp;
      }
      const W = 320, H = 130, P = 8;
      const all = bench ? rc.pct.concat(bench) : rc.pct;
      let mn = Math.min(0, ...all), mx = Math.max(0, ...all);
      if (mx - mn < 1e-9) { mx += 0.01; mn -= 0.01; }
      const X = i => P + i * (W - 2 * P) / (rc.pct.length - 1);
      const Y = v => P + (mx - v) * (H - 2 * P) / (mx - mn);
      const pts = rc.pct.map((v, i) => `${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
      const bpts = bench ? bench.map((v, i) => `${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ") : "";
      const last = rc.pct[rc.pct.length - 1];
      const bLast = bench ? bench[bench.length - 1] : null;
      chart = `<svg class="retsvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="${curRange}回报率曲线，组合 ${CORE.fmtPct(last)}${bLast == null ? "" : "，SPY " + CORE.fmtPct(bLast)}">
          <line class="rzero" x1="${P}" y1="${Y(0).toFixed(1)}" x2="${W - P}" y2="${Y(0).toFixed(1)}"/>
          ${bench ? `<polyline class="rbench" points="${bpts}" fill="none"/>` : ""}
          <polyline class="rline ${last >= 0 ? "pos" : "neg"}" points="${pts}" fill="none" pathLength="1"/>
          <circle class="rdot ${last >= 0 ? "pos" : "neg"}" cx="${X(rc.pct.length - 1).toFixed(1)}" cy="${Y(last).toFixed(1)}" r="3.2"/>
        </svg>
        <div class="retlast ${pnlCls(last)}">${CORE.fmtPct(last)}
          <span class="retcap">未实现回报率 · ${curRange}${bLast == null ? "" : ` · 同期 SPY（虚线）${CORE.fmtPct(bLast)}，${last >= bLast ? "跑赢" : "跑输"} ${CORE.fmtPct(Math.abs(last - bLast), false)}`}</span></div>`;
    } else {
      chart = `<div class="hint" style="padding:26px 0">${Object.keys(h2).length ? "该区间数据点不足" : "正在取历史数据…（公共代理偶尔要等一会）"}</div>`;
    }
    box.innerHTML = tabs + chart;
    box.querySelectorAll(".rtab").forEach(b => b.addEventListener("click", () => {
      curRange = b.dataset.r;
      ensureHist(curRange);
      render();
    }));
  }

  function renderHoldings(view, q) {
    if (!view.rows.length && !view.flats.length) { $("holdings").innerHTML = ""; $("holdings").style.display = "none"; return; }
    $("holdings").style.display = "";
    const P = CORE.fmtPct, S = CORE.fmtShares;
    const head = `<div class="hrow-head"><div>代码</div><div>30 日</div><div class="num">现价 / 今日</div><div class="num">持股</div><div class="num">均价</div><div class="num">市值 / 占比</div><div class="num">盈亏</div></div>`;
    const rowsHtml = view.rows.map((r, rowIdx) => {
      const cur = r.cur;
      const M = (v, o) => CORE.fmtMoney(v, cur, o);
      const hasQ = r.value != null;
      const priceHtml = hasQ
        ? `${M(r.quote.price)}<button class="editp" data-manual="${esc(r.sym)}" aria-label="手动改价" title="手动改价">✎</button>${r.quote.ext ? ` <span class="manual-mark">${esc(r.quote.ext)}</span>` : ""}${r.quote.manual ? ' <span class="manual-mark">手动</span>' : ""}${r.quote.stale ? ' <span class="manual-mark">⚠︎旧</span>' : ""}<span class="sub ${pnlCls(r.dayPnl)}">${r.dayPct == null ? "" : arrow(r.dayPnl) + " " + P(r.dayPct)}</span>`
        : `<button data-manual="${esc(r.sym)}" style="font-size:12px;padding:3px 8px">输入价格</button>`;
      const lotsHtml = expanded.has(r.sym) ? renderLots(r, cur) : "";
      const spark = r.quote && r.quote.spark;
      const sparkCls = (Array.isArray(spark) && spark.length >= 5) ? (spark[spark.length - 1] >= spark[0] ? "pos" : "neg") : "";
      const nm = (r.quote && r.quote.name) || "";
      return `<div class="hrow" data-sym="${esc(r.sym)}" tabindex="0" aria-expanded="${expanded.has(r.sym)}" style="--d:${Math.min(rowIdx, 10) * 40}ms">
        <div class="c-sym sym">${dotText(r.sym, 2.4)}<span class="name">${esc(nm)}${nm ? " · " : ""}${esc(sectorOf(r))}${earnChip(r.sym)}</span></div>
        <div class="c-spark ${sparkCls}">${sparkSvg(spark)}</div>
        <div class="c-price num price-cell">${priceHtml}</div>
        <div class="c-meta">
          <div class="num">${S(r.shares)} 股</div>
          <div class="num"><span class="mlabel">均价 </span>${M(r.avg)}</div>
        </div>
        <div class="c-value num">${hasQ ? M(r.value) : "—"}<span class="sub">占比 ${hasQ ? P(r.alloc, false) : "—"}</span>${hasQ ? `<div class="meter"><i style="width:${Math.min(100, r.alloc * 100).toFixed(1)}%"></i></div>` : ""}</div>
        <div class="c-pnl num ${pnlCls(r.unreal)}">${hasQ ? M(r.unreal, { signed: true }) : "—"}<span class="sub ${pnlCls(r.unreal)}">${hasQ ? P(r.unrealPct) : ""}</span>${Math.abs(r.realized) > 1e-9 ? `<span class="sub">已实现 ${M(r.realized, { signed: true })}</span>` : ""}</div>
        ${lotsHtml}
      </div>`;
    }).join("");
    const flatsHtml = view.flats.length
      ? `<div class="flat-note">已清仓：${view.flats.map(p =>
          `${esc(p.sym)} 已实现 <span class="${pnlCls(p.realized)}">${CORE.fmtMoney(p.realized, p.cur, { signed: true })}</span>`
        ).join("　")}</div>`
      : "";
    $("holdings").innerHTML = head + rowsHtml + flatsHtml;

    // 事件: 点行展开明细; ✎/输入价格 按钮改手动价; 键盘 Enter/空格同点击
    const toggle = el => {
      const sym = el.dataset.sym;
      if (expanded.has(sym)) expanded.delete(sym);
      else { expanded.add(sym); justExpanded = sym; ensureDesc(sym); } // 展开时顺带生成股票详解
      render();
      justExpanded = null;
    };
    $("holdings").querySelectorAll(".hrow").forEach(el => {
      el.addEventListener("click", e => {
        const mBtn = e.target.closest("[data-manual]");
        if (mBtn) { e.stopPropagation(); askManualPrice(mBtn.dataset.manual); return; }
        if (e.target.closest(".lots")) return;
        toggle(el);
      });
      el.addEventListener("keydown", e => {
        if (e.target !== el || (e.key !== "Enter" && e.key !== " ")) return;
        e.preventDefault();
        toggle(el);
      });
    });
  }

  function renderLots(r, cur) {
    const M = (v, o) => CORE.fmtMoney(v, cur, o), S = CORE.fmtShares;
    const price = r.quote ? r.quote.price : null;
    // 有过卖出的持仓不再列单笔盈亏: 已卖掉的股会被重复计价(均价法下单笔口径不成立)
    const showLotPnl = price != null && !r.hasSells;
    const rows = r.lots.map(l => {
      const isSell = l.qty < 0;
      const pnl = (!isSell && showLotPnl) ? (price - l.price) * l.qty : null;
      return `<tr class="${isSell ? "sell" : ""}">
        <td>${esc(l.dateStr) || "—"}</td>
        <td>${isSell ? "卖出" : "买入"}</td>
        <td>${M(l.price)}</td>
        <td>${S(Math.abs(l.qty))}</td>
        <td>${isSell ? "—" : M(l.price * l.qty)}</td>
        <td class="${pnl == null ? "" : pnlCls(pnl)}">${pnl == null ? "—" : M(pnl, { signed: true }) + "（" + CORE.fmtPct((price - l.price) / l.price) + "）"}</td>
      </tr>`;
    }).join("");
    const note = (r.hasSells && price != null)
      ? `<div class="note">该持仓有卖出记录，单笔盈亏不单独列示（按均价法并入上方的未实现/已实现）。</div>` : "";
    const descHtml = settings.geminiKey
      ? `<div class="desc">${aiDesc[r.sym] ? esc(aiDesc[r.sym]) : "股票详解生成中…"}</div>`
      : `<div class="desc" style="color:var(--muted)">股票详解未激活：用带 #h= 的魔法链接打开一次本页面即可（链接里带着 Gemini Key）。</div>`;
    return `<div class="lots${r.sym === justExpanded ? " lots-in" : ""}">${descHtml}<table>
      <tr><th>日期</th><th style="text-align:left">操作</th><th>价格</th><th>股数</th><th>成本</th><th>盈亏</th></tr>
      ${rows}</table>${note}</div>`;
  }

  function askManualPrice(sym) {
    const cur = manual[sym] ? manual[sym].price : "";
    const v = prompt(`${sym} 手动价格（留空清除）：`, cur);
    if (v === null) return;
    const n = parseFloat(v);
    if (v.trim() === "" || !(n > 0)) delete manual[sym];
    else manual[sym] = { price: n, ts: Date.now() };
    LS.set(K.manual, manual);
    render();
  }

  /* ---- 面板 ---- */
  function toast(msg) {
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove("show"), 2600);

  async function copyText(s, okMsg) {
    try { await navigator.clipboard.writeText(s); toast(okMsg); }
    catch {
      const ta = document.createElement("textarea");
      ta.value = s; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); toast(okMsg); } catch { toast("复制失败，请手动复制"); }
      ta.remove();
    }
  }

  /* ---- 记一笔: 表单 → 按今天日期追加一行 ---- */
  function recordTrade(side) {
    const sym = $("tSym").value.trim().toUpperCase();
    const price = parseFloat($("tPrice").value);
    const qty = parseFloat($("tQty").value);
    if (!sym) { toast("请填股票代码"); $("tSym").focus(); return; }
    if (!/^[A-Z0-9][A-Z0-9.\-^=]*$/.test(sym) || !/[A-Z]/.test(sym)) {
      toast("代码需含字母（纯数字代码加市场后缀，如 7203.T / 0700.HK）"); $("tSym").focus(); return;
    }
    if (!(price > 0)) { toast("价格要大于 0"); $("tPrice").focus(); return; }
    if (!(qty > 0)) { toast("数量要大于 0"); $("tQty").focus(); return; }
    const tag = $("tTag").value.trim().replace(/\s+/g, "");
    if (tag && (/^-?\d+(?:\.\d+)?$/.test(tag) || /^\d{1,4}[\/\-.]\d{1,2}[\/\-.]\d{1,4}$/.test(tag))) {
      toast("板块不能是纯数字或日期"); $("tTag").focus(); return;
    }
    const d = new Date();
    const line = `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}  ${sym}  ${price}  ${side === "sell" ? -qty : qty}${tag ? "  " + tag : ""}`;
    holdingsText = (holdingsText.trim() ? holdingsText.replace(/\s+$/, "") + "\n" : "") + line;
    const ok = LS.set(K.holdings, holdingsText);
    toast(ok ? `已记录：${side === "sell" ? "卖出" : "买入"} ${sym} ${qty} 股 @ ${price}` : "保存失败：浏览器不允许本站存储");
    $("tPrice").value = ""; $("tQty").value = ""; // 代码留着, 方便连续记
    refresh();
  }
  $("buyBtn").onclick = () => recordTrade("buy");
  $("sellBtn").onclick = () => recordTrade("sell");

  /* ---- PWA: 运行时生成 manifest + canvas 画图标, "添加到主屏幕"即成 App ---- */
  function makeIcon(size) {
    const c = document.createElement("canvas");
    c.width = c.height = size;
    const g = c.getContext("2d");
    const rr = (x, y, w, h, r) => {
      if (g.roundRect) { g.beginPath(); g.roundRect(x, y, w, h, r); g.fill(); }
      else { g.fillRect(x, y, w, h); }
    };
    g.fillStyle = "#ede9e0";
    g.fillRect(0, 0, size, size);
    const m = size * 0.16, s = size - 2 * m;
    g.fillStyle = "#141412";
    rr(m, m, s, s, size * 0.13);
    g.fillStyle = "#ede9e0";
    const bw = s * 0.52, bh = s * 0.15, cx = size / 2, cy = size / 2, br = bh * 0.3;
    rr(cx - bw / 2, cy - bh / 2, bw, bh, br);
    rr(cx - bh / 2, cy - bw / 2, bh, bw, br);
    return c.toDataURL("image/png");
  }
  function setupPwa() {
    try {
      if (location.protocol !== "http:" && location.protocol !== "https:") return; // file:// 无意义
      const dir = location.pathname.replace(/[^/]*$/, "");
      const manifest = {
        name: "持仓盈亏 P/L Tracker",
        short_name: "持仓盈亏",
        start_url: location.origin + dir,   // blob manifest 里相对路径无从解析, 必须绝对地址
        scope: location.origin + dir,
        display: "standalone",
        background_color: "#ede9e0",
        theme_color: "#ede9e0",
        icons: [192, 512].map(sz => ({ src: makeIcon(sz), sizes: sz + "x" + sz, type: "image/png", purpose: "any" })),
      };
      const link = document.createElement("link");
      link.rel = "manifest";
      link.href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" }));
      document.head.appendChild(link);
      const ap = document.createElement("link"); // iOS 图标 (部分版本认 data URI, 不认则退回页面截图)
      ap.rel = "apple-touch-icon";
      ap.href = makeIcon(180);
      document.head.appendChild(ap);
      if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(() => {}); // 没有 sw.js 就静默跳过
    } catch {}
  }
  setupPwa();

  /* ---- 启动 ---- */
  document.body.classList.add("boot"); // 首屏入场动画窗口, 之后的重渲染不再重放
  setTimeout(() => document.body.classList.remove("boot"), 2600);
  $("wordmark").innerHTML = dotText("P/L TRACKER", 1.7);
  document.body.classList.toggle("green-up", !!settings.greenUp); // 涨跌配色沿用已存设置

  // 折线以下区块: 滚动到视口时滑入 (不支持 IO 或系统减少动态时直接常显)
  if ("IntersectionObserver" in window && matchMedia("(prefers-reduced-motion: no-preference)").matches) {
    const io = new IntersectionObserver(entries => entries.forEach(en => {
      if (en.isIntersecting) { en.target.classList.add("inview"); io.unobserve(en.target); }
    }), { threshold: 0.12 });
    document.querySelectorAll(".mainCols > *, .tradeWrap").forEach(elm => {
      elm.classList.add("reveal");
      io.observe(elm);
    });
  }
  // 窗口尺寸变化 → 重排 (海报画布上的球/标注按视口定位)
  let rsT;
  window.addEventListener("resize", () => { clearTimeout(rsT); rsT = setTimeout(render, 180); });

  render();      // 先用缓存/手动价即时渲染
  refresh();     // 再拉最新行情

  // 自动刷新: 页面可见时每 5 分钟; 切回页面且行情 >2 分钟旧时刷一次
  setInterval(() => { if (!document.hidden) refresh(); }, 5 * 60 * 1000);
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) return;
    const tsList = Object.values(quotes).map(x => x.ts || 0);
    const newest = tsList.length ? Math.max(...tsList) : 0;
    if (Date.now() - newest > 2 * 60 * 1000) refresh();
  });
})();
</script>
</body>
